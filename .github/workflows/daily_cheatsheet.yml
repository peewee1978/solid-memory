name: Daily Cheat Sheet (Train & Send)

on:
  schedule:
    - cron: '0 17 * * *' # 17:00 UTC (12:00 Central during DST)
    - cron: '0 18 * * *' # 18:00 UTC (12:00 Central during Standard Time)
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sendgrid python-dotenv joblib

      - name: Run daily pipeline
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          ESPN_API_KEY: ${{ secrets.ESPN_API_KEY }}
          RAPID_API_KEY: ${{ secrets.RAPID_API_KEY }}
        run: |
          python src/tasks/generate_and_send.py
